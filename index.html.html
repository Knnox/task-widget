<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Daily Task Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Variables ── */
  :root {
    --bg:         #0f0f12;
    --surface:    #17171c;
    --surface2:   #1e1e26;
    --border:     rgba(255,255,255,0.07);
    --border2:    rgba(255,255,255,0.12);
    --text:       #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim:   #3d3d4d;

    --today-h:    25;
    --today:      hsl(var(--today-h) 90% 62%);
    --today-dim:  hsl(var(--today-h) 60% 20%);
    --today-bg:   hsl(var(--today-h) 40% 10%);

    --up-h:       210;
    --up:         hsl(var(--up-h) 80% 62%);
    --up-dim:     hsl(var(--up-h) 50% 18%);
    --up-bg:      hsl(var(--up-h) 40% 9%);

    --none-h:     260;
    --none:       hsl(var(--none-h) 20% 58%);
    --none-dim:   hsl(var(--none-h) 15% 20%);
    --none-bg:    hsl(var(--none-h) 15% 10%);

    --accent:     hsl(var(--today-h) 90% 62%);
    --radius:     12px;
    --radius-sm:  8px;
    --mono:       'DM Mono', monospace;
    --sans:       'Syne', sans-serif;
    --ease:       cubic-bezier(0.22, 0.84, 0.36, 1);
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 28px 20px 60px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding-bottom: 4px;
  }
  .header h1 {
    font-family: var(--sans);
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .header .date-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* ── Input Area ── */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 4px;
    display: flex;
    gap: 6px;
    align-items: flex-end;
    transition: border-color 0.2s;
  }
  .input-area:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px hsl(var(--today-h) 80% 50% / 0.1);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.6;
    padding: 10px 12px;
    resize: none;
    min-height: 64px;
    max-height: 200px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-dim); }
  .add-btn {
    background: var(--accent);
    color: #0f0f12;
    border: none;
    border-radius: var(--radius-sm);
    width: 36px; height: 36px;
    margin: 0 4px 4px 0;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }
  .add-btn:hover { transform: scale(1.08); }
  .add-btn:active { transform: scale(0.95); }

  /* ── Hint strip ── */
  .hint {
    font-family: var(--mono);
    font-size: 0.67rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    padding: 0 2px;
  }
  .hint span { color: var(--text-muted); }

  /* ── Section ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideIn 0.3s var(--ease);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: rgba(255,255,255,0.03); }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .section-pill {
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 0.62rem;
    font-weight: 500;
  }
  .section-count {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-muted);
  }
  .chevron {
    width: 16px; height: 16px;
    color: var(--text-muted);
    transition: transform 0.25s var(--ease);
    flex-shrink: 0;
  }
  .section.collapsed .chevron { transform: rotate(-90deg); }

  /* Today accent */
  .section.today { border-color: hsl(var(--today-h) 60% 22%); }
  .section.today .section-header { background: var(--today-bg); }
  .section.today .section-title { color: var(--today); }
  .section.today .section-pill { background: var(--today-dim); color: var(--today); }

  /* Upcoming accent */
  .section.upcoming { border-color: hsl(var(--up-h) 40% 20%); }
  .section.upcoming .section-header { background: var(--up-bg); }
  .section.upcoming .section-title { color: var(--up); }
  .section.upcoming .section-pill { background: var(--up-dim); color: var(--up); }

  /* No-date accent */
  .section.nodate .section-header { background: var(--none-bg); }
  .section.nodate .section-title { color: var(--none); }
  .section.nodate .section-pill { background: var(--none-dim); color: var(--none); }

  /* ── Section body / collapse ── */
  .section-body {
    overflow: hidden;
    transition: max-height 0.35s var(--ease), opacity 0.25s ease;
    max-height: 2000px;
    opacity: 1;
  }
  .section.collapsed .section-body {
    max-height: 0;
    opacity: 0;
  }
  .section-inner { padding: 0 10px 10px; }

  /* ── Task Item ── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 8px;
    border-radius: var(--radius-sm);
    transition: background 0.15s;
    animation: fadeItem 0.25s var(--ease);
    cursor: default;
  }
  @keyframes fadeItem {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .task-item:hover { background: rgba(255,255,255,0.04); }

  .task-checkbox {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem;
    color: transparent;
  }
  .task-item.done .task-checkbox {
    background: var(--text-dim);
    border-color: var(--text-dim);
    color: var(--bg);
  }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 0.84rem;
    color: var(--text);
    word-break: break-word;
    transition: color 0.15s;
  }
  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }
  .task-time {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.04em;
  }
  .task-date-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: var(--text-muted);
  }

  .today .task-time { color: var(--today); }
  .upcoming .task-time { color: var(--up); }

  .task-delete {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: #ff6b6b; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ── Timeblock section ── */
  .timeblock-section {
    background: var(--surface);
    border: 1px solid hsl(var(--today-h) 50% 20%);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .timeblock-header {
    background: hsl(var(--today-h) 30% 10%);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .timeblock-header:hover { background: hsl(var(--today-h) 30% 12%); }
  .timeblock-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--today);
    display: flex; align-items: center; gap: 8px;
  }
  .timeblock-actions { display: flex; align-items: center; gap: 10px; }
  .gen-btn {
    background: var(--today);
    color: #0f0f12;
    border: none;
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-family: var(--sans);
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .gen-btn:hover { transform: scale(1.04); }
  .gen-btn:active { transform: scale(0.97); }

  .timeblock-body {
    overflow: hidden;
    transition: max-height 0.35s var(--ease), opacity 0.25s ease;
    max-height: 2000px;
    opacity: 1;
  }
  .timeblock-section.collapsed .timeblock-body { max-height: 0; opacity: 0; }
  .timeblock-inner { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; }

  .block-group { display: flex; flex-direction: column; gap: 4px; }
  .block-group-label {
    font-family: var(--mono);
    font-size: 0.63rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .block-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 7px 10px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--today-dim);
    font-size: 0.82rem;
  }
  .block-time {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--today);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .block-task { color: var(--text); }

  /* ── Copy area ── */
  .copy-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-top: 4px;
    position: relative;
  }
  .copy-area pre {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.62rem;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: color 0.15s, background 0.15s;
  }
  .copy-btn:hover { color: var(--today); background: var(--today-bg); }
  .copy-btn.copied { color: #6bcb77; }

  /* ── Empty state ── */
  .empty {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    padding: 12px 8px;
    text-align: center;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1><span class="dot"></span>Task Builder</h1>
    <span class="date-badge" id="headerDate"></span>
  </div>

  <!-- Input -->
  <div>
    <div class="input-area">
      <textarea id="taskInput" placeholder="Call sponsor tomorrow 2pm&#10;Email leads today&#10;Finish doc Friday" rows="3"></textarea>
      <button class="add-btn" id="addBtn" title="Add tasks (Enter)">+</button>
    </div>
    <div class="hint" style="margin-top:6px;">
      Keywords: <span>today · tomorrow · monday–sunday · this week</span> &nbsp;|&nbsp; Times: <span>2pm · 14:00 · 9:30am</span>
    </div>
  </div>

  <!-- Sections container -->
  <div id="sections"></div>

  <!-- Timeblock section -->
  <div id="timeblockWrap" style="display:none;"></div>

</div>

<script>
// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('sdtb_tasks') || '[]');
let sectionStates = JSON.parse(localStorage.getItem('sdtb_sec') || '{}');
let tbOpen = JSON.parse(localStorage.getItem('sdtb_tb') || 'true');
let scheduleGenerated = false;
let scheduleText = '';
let nextId = tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 1;

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

// ─────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────
function save() {
  localStorage.setItem('sdtb_tasks', JSON.stringify(tasks));
  localStorage.setItem('sdtb_sec', JSON.stringify(sectionStates));
  localStorage.setItem('sdtb_tb', JSON.stringify(tbOpen));
}

function dateKey(d) {
  if (!d) return null;
  const dt = new Date(d); dt.setHours(0,0,0,0);
  return dt.toISOString().slice(0,10);
}

function todayKey() { return dateKey(TODAY); }

function dayName(d) {
  if (!d) return '';
  const dt = new Date(d); dt.setHours(0,0,0,0);
  const diff = Math.round((dt - TODAY) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function fmt12(mins) {
  if (mins === null) return '';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2,'0')}${ampm}`;
}

function fmtRange(startMins, durMins) {
  const end = startMins + durMins;
  return `[${fmt12(startMins)}–${fmt12(end)}]`;
}

// ─────────────────────────────────────────
// Parser
// ─────────────────────────────────────────
function parseTask(raw) {
  let text = raw.trim();
  if (!text) return null;

  let date = null;
  let timeMins = null;

  // ── Time patterns ──
  const timePatterns = [
    /\b(\d{1,2}):(\d{2})\s*(am|pm)\b/i,
    /\b(\d{1,2})\s*(am|pm)\b/i,
    /\b(\d{2}):(\d{2})\b/,
  ];
  for (const p of timePatterns) {
    const m = text.match(p);
    if (m) {
      let h = parseInt(m[1]);
      const min = m[2] && /^\d+$/.test(m[2]) ? parseInt(m[2]) : 0;
      const ampm = m[3] || (m[2] && /^(am|pm)$/i.test(m[2]) ? m[2] : null);
      if (ampm) {
        if (/pm/i.test(ampm) && h < 12) h += 12;
        if (/am/i.test(ampm) && h === 12) h = 0;
      }
      timeMins = h * 60 + min;
      text = text.replace(m[0], '').trim();
      break;
    }
  }

  // ── Date keywords ──
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const lc = text.toLowerCase();

  if (/\btoday\b/.test(lc)) {
    date = new Date(TODAY);
    text = text.replace(/\btoday\b/gi, '').trim();
  } else if (/\btomorrow\b/.test(lc)) {
    date = new Date(TODAY); date.setDate(date.getDate() + 1);
    text = text.replace(/\btomorrow\b/gi, '').trim();
  } else if (/\bthis week\b/.test(lc)) {
    date = new Date(TODAY); date.setDate(date.getDate() + 2);
    text = text.replace(/\bthis week\b/gi, '').trim();
  } else if (/\bnext week\b/.test(lc)) {
    date = new Date(TODAY); date.setDate(date.getDate() + 7);
    text = text.replace(/\bnext week\b/gi, '').trim();
  } else {
    for (let i = 0; i < days.length; i++) {
      const re = new RegExp('\\b' + days[i] + '\\b', 'i');
      if (re.test(lc)) {
        const todayDay = TODAY.getDay();
        let diff = i - todayDay;
        if (diff <= 0) diff += 7;
        date = new Date(TODAY); date.setDate(date.getDate() + diff);
        text = text.replace(re, '').trim();
        break;
      }
    }
  }

  // clean up stray punctuation
  text = text.replace(/\s{2,}/g, ' ').replace(/^[,\-–]+|[,\-–]+$/g, '').trim();
  if (!text) text = raw.trim();

  // If time is set but no date, assume today
  if (timeMins !== null && !date) date = new Date(TODAY);

  return { id: nextId++, text, date: date ? date.toISOString() : null, timeMins, done: false };
}

// ─────────────────────────────────────────
// Bucket logic
// ─────────────────────────────────────────
function bucketTasks() {
  const tk = todayKey();
  const todayTasks = [], upcomingTasks = [], nodateTasks = [];

  tasks.forEach(t => {
    if (!t.date) { nodateTasks.push(t); return; }
    const dk = dateKey(t.date);
    if (dk === tk) todayTasks.push(t);
    else if (new Date(t.date) > TODAY) upcomingTasks.push(t);
    else todayTasks.push(t); // overdue → today
  });

  // Sort today: by time first, then input order
  todayTasks.sort((a, b) => {
    if (a.timeMins !== null && b.timeMins !== null) return a.timeMins - b.timeMins;
    if (a.timeMins !== null) return -1;
    if (b.timeMins !== null) return 1;
    return a.id - b.id;
  });

  // Sort upcoming: chronological
  upcomingTasks.sort((a, b) => {
    const da = new Date(a.date), db = new Date(b.date);
    if (da - db !== 0) return da - db;
    if (a.timeMins !== null && b.timeMins !== null) return a.timeMins - b.timeMins;
    return a.id - b.id;
  });

  return { todayTasks, upcomingTasks, nodateTasks };
}

// ─────────────────────────────────────────
// Timeblock suggester
// ─────────────────────────────────────────
function suggestTimeblocks(todayTasks) {
  const fixed = todayTasks.filter(t => t.timeMins !== null && !t.done);
  const free  = todayTasks.filter(t => t.timeMins === null && !t.done);
  const deep  = free.filter(t => t.text.split(' ').length >= 4);
  const quick = free.filter(t => t.text.split(' ').length < 4);
  return { fixed, deep, quick };
}

function generateSchedule(todayTasks) {
  const { fixed, deep, quick } = suggestTimeblocks(todayTasks);
  const lines = [];
  let cursor = 9 * 60; // 9:00am start

  // Place fixed tasks first
  const sortedFixed = [...fixed].sort((a,b) => a.timeMins - b.timeMins);
  sortedFixed.forEach(t => {
    lines.push(`${fmtRange(t.timeMins, 30)} ${t.text}`);
  });

  // Deep work block
  if (deep.length) {
    const dur = Math.min(90, Math.max(60, deep.length * 25));
    // skip past any fixed task conflict
    while (sortedFixed.some(t => t.timeMins >= cursor && t.timeMins < cursor + dur)) cursor += 30;
    lines.push(`\n${fmtRange(cursor, dur)} Deep Work`);
    deep.forEach(t => lines.push(`  · ${t.text}`));
    cursor += dur + 15;
  }

  // Quick tasks block
  if (quick.length) {
    const dur = Math.min(60, Math.max(30, quick.length * 12));
    while (sortedFixed.some(t => t.timeMins >= cursor && t.timeMins < cursor + dur)) cursor += 30;
    lines.push(`\n${fmtRange(cursor, dur)} Quick Tasks`);
    quick.forEach(t => lines.push(`  · ${t.text}`));
  }

  return lines.join('\n').trim();
}

// ─────────────────────────────────────────
// Render
// ─────────────────────────────────────────
function render() {
  save();
  const { todayTasks, upcomingTasks, nodateTasks } = bucketTasks();
  const container = document.getElementById('sections');
  container.innerHTML = '';

  renderSection(container, 'today', 'Today', todayTasks);
  renderSection(container, 'upcoming', 'Upcoming', upcomingTasks);
  renderSection(container, 'nodate', 'No Date', nodateTasks);

  renderTimeblocks(todayTasks);
}

function renderSection(container, key, label, list) {
  if (!list.length) return;

  const open = sectionStates[key] !== false;
  const sec = document.createElement('div');
  sec.className = `section ${key}${open ? '' : ' collapsed'}`;

  const icons = { today: '◈', upcoming: '◇', nodate: '○' };

  sec.innerHTML = `
    <div class="section-header" data-key="${key}">
      <div class="section-title">
        ${icons[key]} ${label}
        <span class="section-pill">${list.length}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="section-count">${list.filter(t=>t.done).length}/${list.length} done</span>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="4,6 8,10 12,6"/>
        </svg>
      </div>
    </div>
    <div class="section-body">
      <div class="section-inner" id="inner-${key}"></div>
    </div>
  `;
  container.appendChild(sec);

  sec.querySelector('.section-header').addEventListener('click', () => {
    sectionStates[key] = sec.classList.toggle('collapsed') ? false : true;
    save();
  });

  const inner = sec.querySelector(`#inner-${key}`);
  if (!list.length) { inner.innerHTML = '<div class="empty">Nothing here yet</div>'; return; }

  list.forEach((t, i) => {
    if (i > 0) inner.appendChild(Object.assign(document.createElement('div'), { className: 'divider' }));
    inner.appendChild(makeTaskEl(t, key));
  });
}

function makeTaskEl(t, sectionKey) {
  const el = document.createElement('div');
  el.className = `task-item${t.done ? ' done' : ''}`;
  el.dataset.id = t.id;

  const metaParts = [];
  if (t.timeMins !== null) metaParts.push(`<span class="task-time">${fmt12(t.timeMins)}</span>`);
  if (sectionKey === 'upcoming' && t.date) metaParts.push(`<span class="task-date-label">${dayName(t.date)}</span>`);
  if (sectionKey === 'nodate' && !t.date) metaParts.push(`<span class="task-date-label">unscheduled</span>`);

  el.innerHTML = `
    <div class="task-checkbox" title="Mark done">✓</div>
    <div class="task-body">
      <div class="task-text">${escHtml(t.text)}</div>
      ${metaParts.length ? `<div class="task-meta">${metaParts.join('')}</div>` : ''}
    </div>
    <button class="task-delete" title="Remove">✕</button>
  `;

  el.querySelector('.task-checkbox').addEventListener('click', e => {
    e.stopPropagation();
    const task = tasks.find(x => x.id === t.id);
    if (task) { task.done = !task.done; scheduleGenerated = false; render(); }
  });

  el.querySelector('.task-delete').addEventListener('click', e => {
    e.stopPropagation();
    tasks = tasks.filter(x => x.id !== t.id);
    scheduleGenerated = false;
    render();
  });

  return el;
}

function renderTimeblocks(todayTasks) {
  const wrap = document.getElementById('timeblockWrap');
  const activeTodayTasks = todayTasks.filter(t => !t.done);
  if (!activeTodayTasks.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const { fixed, deep, quick } = suggestTimeblocks(todayTasks);

  wrap.innerHTML = `
    <div class="timeblock-section${tbOpen ? '' : ' collapsed'}">
      <div class="timeblock-header" id="tbHeader">
        <div class="timeblock-title">⬡ Suggested Timeblocks</div>
        <div class="timeblock-actions">
          <button class="gen-btn" id="genBtn">Generate Schedule</button>
          <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4,6 8,10 12,6"/>
          </svg>
        </div>
      </div>
      <div class="timeblock-body">
        <div class="timeblock-inner" id="tbInner"></div>
      </div>
    </div>
  `;

  const sec = wrap.querySelector('.timeblock-section');
  wrap.querySelector('#tbHeader').addEventListener('click', e => {
    if (e.target.closest('#genBtn')) return;
    tbOpen = !sec.classList.toggle('collapsed');
    save();
  });

  wrap.querySelector('#genBtn').addEventListener('click', () => {
    scheduleText = generateSchedule(todayTasks);
    scheduleGenerated = true;
    renderTBInner(todayTasks, fixed, deep, quick);
  });

  renderTBInner(todayTasks, fixed, deep, quick);
}

function renderTBInner(todayTasks, fixed, deep, quick) {
  const inner = document.getElementById('tbInner');
  if (!inner) return;
  inner.innerHTML = '';

  // Suggestion groups
  if (fixed.length) {
    inner.appendChild(makeBlockGroup('Fixed Time', fixed.map(t => ({
      label: fmt12(t.timeMins),
      text: t.text
    }))));
  }
  if (deep.length) {
    inner.appendChild(makeBlockGroup('Deep Work (60–90 min)', deep.map(t => ({
      label: '~', text: t.text
    }))));
  }
  if (quick.length) {
    inner.appendChild(makeBlockGroup('Quick Tasks (30–60 min)', quick.map(t => ({
      label: '~', text: t.text
    }))));
  }

  // Generated schedule output
  if (scheduleGenerated && scheduleText) {
    const copyDiv = document.createElement('div');
    copyDiv.className = 'copy-area';
    copyDiv.innerHTML = `
      <pre id="schedPre">${escHtml(scheduleText)}</pre>
      <button class="copy-btn" id="copyBtn">copy</button>
    `;
    inner.appendChild(copyDiv);

    copyDiv.querySelector('#copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(scheduleText).then(() => {
        const btn = copyDiv.querySelector('#copyBtn');
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
  }
}

function makeBlockGroup(label, items) {
  const g = document.createElement('div');
  g.className = 'block-group';
  g.innerHTML = `<div class="block-group-label">${escHtml(label)}</div>`;
  items.forEach(({ label: lbl, text }) => {
    const bi = document.createElement('div');
    bi.className = 'block-item';
    bi.innerHTML = `<span class="block-time">${escHtml(lbl)}</span><span class="block-task">${escHtml(text)}</span>`;
    g.appendChild(bi);
  });
  return g;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────
// Input handler
// ─────────────────────────────────────────
function addTasks() {
  const raw = document.getElementById('taskInput').value;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  lines.forEach(line => {
    const t = parseTask(line);
    if (t) tasks.push(t);
  });
  document.getElementById('taskInput').value = '';
  scheduleGenerated = false;
  render();
}

document.getElementById('addBtn').addEventListener('click', addTasks);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTasks(); }
});

// ─────────────────────────────────────────
// Boot
// ─────────────────────────────────────────
document.getElementById('headerDate').textContent =
  TODAY.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric', year:'numeric' });

render();
</script>
</body>
</html>
